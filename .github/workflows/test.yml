name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright:
    # Using the official Playwright container for system deps; browsers
    # are installed via `pnpm exec playwright install` so they always
    # match the @playwright/test version in the lockfile (image tag can
    # lag behind library bumps for ~a week).
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --user 1001
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers matching lib version
        run: pnpm exec playwright install chromium firefox webkit

      - name: Verify generated bundles are up to date
        run: |
          pnpm build
          git diff --exit-code js/cider.js dist/ || {
            echo "::error::Generated output is stale. Run \`pnpm build\` locally and commit js/cider.js + dist/.";
            exit 1;
          }

      - name: Prettier check
        run: pnpm prettier --check .

      - name: Type check
        run: pnpm test:types

      - name: Tree-shake contract (components import _shared where needed)
        run: pnpm test:shared-imports

      - name: Playwright tests
        run: pnpm test
        env:
          CI: "true"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
